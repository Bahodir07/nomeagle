services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nomeagle_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: nomeagle_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: nomeagle_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nomeagle
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: nomeagle_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: